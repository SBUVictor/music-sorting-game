<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shelf It Right V2</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f5f7fa;
  padding:40px;
}

.card {
  background:white;
  padding:30px;
  border-radius:12px;
  max-width:800px;
  margin:auto;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h3 { margin-top:0; }

.choice {
  display:inline-block;
  margin:10px;
  padding:12px;
  border:1px solid #ccc;
  border-radius:8px;
  cursor:pointer;
}

.choice:hover {
  background:#eef3f8;
}

.label {
  border:2px solid #333;
  padding:10px;
  width:120px;
  text-align:center;
  line-height:1.6;
  font-weight:bold;
}

.correct { background:#e6f7ec; }
.wrong { background:#fdecea; }

button {
  padding:10px 14px;
  margin-top:20px;
}
</style>

</head>

<body>

<div class="card" id="app"></div>

<script>

let round = 0;
let score = 0;

function label(lines){
  return `<div class="label">${lines.join("<br>")}</div>`;
}

const rounds = [

{
lesson: `
<h3>Fine Sorting</h3>

<p>You are sorting items that are already in the correct section.</p>

<p>Read call numbers <strong>top to bottom</strong> and compare each line in order.</p>
`,
question: "Which comes first?",
choices: [
label(["M","500"]),
label(["M","1010"]),
label(["M","750"])
],
answer: 0
},

{
lesson: `
<h3>First Cutter</h3>

<p>Cutter numbers are read like decimals.</p>

<p>.B4 comes before .B45</p>
`,
question: "Which comes first?",
choices: [
label([".B45"]),
label([".B4"]),
label([".B5"])
],
answer: 1
},

{
lesson: `
<h3>Second Cutter</h3>

<p>The second Cutter is also read like a decimal, even without a dot.</p>

<p>T10 behaves like .10</p>
`,
question: "Which comes first?",
choices: [
label(["T2"]),
label(["T10"]),
label(["T3"])
],
answer: 1
},

{
lesson: `
<h3>Line 4 — Added Elements</h3>

<p>Extra elements are added to make items unique.</p>

<p>Examples include:</p>
<ul>
<li>Opus numbers</li>
<li>Numbers within a work</li>
</ul>

<p><strong>Compare left to right.</strong></p>
`,
question: "Which comes first?",
choices: [
label(["op. 42","no. 2"]),
label(["op. 42","no. 10"]),
label(["op. 50"])
],
answer: 0
}

];

function render(){
if(round >= rounds.length) return end();

let r = rounds[round];

document.getElementById("app").innerHTML = `
${r.lesson}
<p><strong>${r.question}</strong></p>
${r.choices.map((c,i)=>`
<div class="choice" onclick="answer(${i})">${c}</div>
`).join("")}
<p>Score: ${score}</p>
`;
}

function answer(i){
let correct = rounds[round].answer;

let choices = document.querySelectorAll(".choice");

choices.forEach((c, idx)=>{
if(idx === correct) c.classList.add("correct");
if(idx === i && i !== correct) c.classList.add("wrong");
});

if(i === correct) score++;

setTimeout(()=>{
round++;
render();
}, 800);
}

function end(){
document.getElementById("app").innerHTML = `
<h2>V2 Stable</h2>
<p>Score: ${score}/${rounds.length}</p>
<button onclick="location.reload()">Restart</button>
`;
}

render();

</script>

</body>
</html>
