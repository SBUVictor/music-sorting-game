<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shelf It Right</title>
<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.card { background:white; padding:20px; border-radius:10px; max-width:700px; margin:auto; }
button { padding:10px; margin-top:10px; cursor:pointer; }
.choice { display:block; margin:10px 0; padding:10px; border:1px solid #ccc; cursor:pointer; }
.correct { background:#e3f9e5; }
.wrong { background:#fde8e8; }
</style>
</head>

<body>
<div class="card" id="app"></div>

<script>

let round = 0;
let score = 0;

const rounds = [

{
lesson: `
<h3>What is a Score?</h3>
<p>A <strong>score</strong> is the written music of a piece showing multiple parts together.</p>
<p>A <strong>part</strong> is only one instrument or section.</p>
`,
question: "What is a score?",
choices: [
"Music for one instrument",
"A written version showing multiple parts",
"A recording"
],
answer: 1
},

{
lesson: `
<h3>Mini-Scores</h3>
<p>A <strong>mini-score</strong> is a smaller study version.</p>
<p>A lowercase <strong>m</strong> (like m1998) means mini-score.</p>
`,
question: "What does lowercase m mean?",
choices: [
"Mini-score",
"Major key",
"Missing page"
],
answer: 0
},

{
lesson: `
<h3>Whole Numbers</h3>
<p>Compare the whole number first.</p>
`,
question: "Which comes first?",
choices: ["M 100", "M 50", "M 75"],
answer: 1
},

{
lesson: `
<h3>First Cutter</h3>
<p>Read like a decimal.</p>
<p>.B4 comes before .B45</p>
`,
question: "Which comes first?",
choices: [".B45", ".B4", ".B5"],
answer: 1
},

{
lesson: `
<h3>Second Cutter</h3>
<p>The second Cutter is also read like a decimal — even without a dot.</p>
<p>T10 behaves like .10</p>
`,
question: "Which comes first?",
choices: ["T2", "T10", "T3"],
answer: 1
},

{
lesson: `
<h3>Year</h3>
<p>If everything else matches, earlier year comes first.</p>
`,
question: "Which comes first?",
choices: ["2005", "1998", "2010"],
answer: 1
}

];

function render() {
if (round >= rounds.length) return end();

let r = rounds[round];

document.getElementById("app").innerHTML = `
${r.lesson}
<p><strong>${r.question}</strong></p>
${r.choices.map((c,i)=>`
<div class="choice" onclick="answer(${i})">${c}</div>
`).join("")}
<p>Score: ${score}</p>
`;
}

function answer(i) {
if (i === rounds[round].answer) score++;
round++;
render();
}

function end() {
document.getElementById("app").innerHTML = `
<h2>Done</h2>
<p>Score: ${score}/${rounds.length}</p>
<button onclick="location.reload()">Restart</button>
`;
}

render();

</script>
</body>
</html>
