<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBU Music Library | Staff Certification</title>
    <style>
        :root { --sbu-red: #990000; --cream: #F8F2C5; --dark: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; background: #edeff2; padding: 20px; color: #333; }
        .container { background: #fff; max-width: 700px; margin: 0 auto; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #d1d5db; }
        .progress-bar { height: 8px; background: #e5e7eb; border-radius: 10px; margin-bottom: 25px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--sbu-red); transition: 0.4s; }
        .stats { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 10px; text-transform: uppercase; }
        h2 { font-size: 1.5rem; margin: 0 0 20px 0; color: var(--dark); }
        .opt { display: block; width: 100%; padding: 18px; margin-bottom: 12px; border: 2px solid #e5e7eb; border-radius: 10px; background: #fff; font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: bold; text-align: left; cursor: pointer; transition: 0.2s; }
        .opt:hover { border-color: var(--sbu-red); background: var(--cream); }
        .feedback { padding: 20px; border-radius: 10px; margin-top: 15px; font-weight: bold; display: none; }
        .correct { background: #dcfce7; color: #166534; border: 1px solid #22c55e; }
        .wrong { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .btn-next { background: var(--sbu-red); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .shelf-box { background: #f3f4f6; padding: 15px; border-radius: 10px; min-height: 100px; border: 2px dashed #9ca3af; }
        .book { background: #fff; border: 2px solid #333; padding: 12px; margin-bottom: 8px; cursor: grab; font-family: monospace; font-weight: bold; border-radius: 5px; }
        .dragging { opacity: 0.5; background: var(--cream); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="stats"><span id="module-name">Module 1</span> <span id="counter">Q 1/3</span></div>
    <div class="progress-bar"><div id="fill"></div></div>

    <div id="quiz-ui">
        <h2 id="q-text">Loading...</h2>
        <div id="options-box"></div>
        <div id="feedback-box" class="feedback"></div>
    </div>

    <div id="shelf-ui" class="hidden">
        <h2>Final Master Sort</h2>
        <p style="font-size: 0.9rem; margin-bottom: 15px;">Drag to sort the shelf in correct LC sequence:</p>
        <div id="shelf-area" class="shelf-box"></div>
        <button class="btn-next" onclick="verifyShelf()" style="margin-top:20px">Submit Final Order</button>
        <div id="shelf-feedback" class="feedback"></div>
    </div>

    <div id="win-ui" class="hidden" style="text-align:center">
        <h1 style="color:var(--sbu-red)">CERTIFICATION COMPLETE</h1>
        <p>User has mastered the Music Library Shelving standards.</p>
        <button class="btn-next" onclick="location.reload()" style="width:auto; padding: 15px 40px;">Restart Assessment</button>
    </div>
</div>

<script>
    const data = {
        m1: [ // Whole Numbers
            { q: "Sort Line 2 (Whole Numbers):", o: ["M 14.5 .S4", "M 15 .A2"], a: 0 },
            { q: "Sort Line 2:", o: ["M 202 .C3", "M 25 .C3"], a: 1 },
            { q: "Decimals in Line 2:", o: ["M 1.7 .R3", "M 1.75 .R3"], a: 0 },
            { q: "Large Value Transition:", o: ["M 999 .B8", "M 1001 .B8"], a: 0 },
            { q: "Small Ensemble Values:", o: ["M 312 .C5", "M 322 .C5"], a: 0 },
            { q: "Sequence Whole Numbers:", o: ["M 1503 .W3", "M 1500 .W3"], a: 1 },
            { q: "Vocal Score Value:", o: ["M 1508 .S8", "M 1503 .S8"], a: 1 },
            { q: "Chamber Music Sort:", o: ["M 452", "M 412"], a: 1 }
        ],
        m2: [ // Cutters (Decimals)
            { q: "Decimal Cutter Trap:", o: [".C36", ".C4"], a: 0 },
            { q: "Alpha-Numeric Sort:", o: [".B127", ".B2"], a: 0 },
            { q: "Zero-Placeholder:", o: [".B09", ".B1"], a: 0 },
            { q: "Cutter Sequence:", o: [".A81", ".A9"], a: 0 },
            { q: "Double Cutter Priority:", o: [".M3 S6", ".M32 S1"], a: 0 },
            { q: "First Cutter Matches:", o: [".W44 C2", ".W442 C8"], a: 0 },
            { q: "Long Cutter String:", o: [".S347", ".S35"], a: 0 },
            { q: "Cutter Value Check:", o: [".R64", ".R6"], a: 1 }
        ],
        m3: [ // The Gap & Sub-units
            { q: "Apply 'Nothing Before Something':", o: ["M 3 .B8", "M 3 .B8 1996"], a: 0 },
            { q: "Chronological Sort:", o: ["M 452 .S3 1950", "M 452 .S3 2001"], a: 0 },
            { q: "Sub-unit Alpha Priority:", o: ["FASC. 2", "SER. 1"], a: 0 },
            { q: "Volume vs. Year Priority:", o: ["1992", "v. 1"], a: 1 },
            { q: "Suffix Priority:", o: ["(Score)", "parts"], a: 0 },
            { q: "Roman Numeral Hierarchy:", o: ["Ser. I", "Ser. IV"], a: 0 },
            { q: "Gap Rule Check:", o: ["M 25 .C44", "M 25 .C44 2012"], a: 0 },
            { q: "Part vs volume:", o: ["v. 2", "pt. 1"], a: 1 }
        ],
        m4: [ // Thematic Numbers
            { q: "Mozart (KV):", o: ["KV 450", "KV 450a"], a: 0 },
            { q: "Bach (BWV):", o: ["BWV 1001", "BWV 1001.2"], a: 0 },
            { q: "General 'WoO' Sort:", o: ["WoO 1", "WoO 10"], a: 0 },
            { q: "Schubert (D. Numbers):", o: ["D. 99", "D. 500"], a: 0 },
            { q: "Haydn (Hob. Numbers):", o: ["Hob. I:1", "Hob. I:10"], a: 0 },
            { q: "Opus vs. WoO labels:", o: ["Op. 10", "WoO 1"], a: 0 },
            { q: "Beethoven Op. Sort:", o: ["Op. 18 no. 1", "Op. 18 no. 6"], a: 0 },
            { q: "Thematic Alpha Suffix:", o: ["BWV 101", "BWV 101a"], a: 0 }
        ]
    };

    let currentMod = 'm1';
    let qIndex = 0;
    let questionsThisMod = [];

    function initMod(mKey) {
        currentMod = mKey;
        qIndex = 0;
        // Shuffle and pick 3
        questionsThisMod = data[mKey].sort(() => 0.5 - Math.random()).slice(0, 3);
        renderQuestion();
    }

    function renderQuestion() {
        const q = questionsThisMod[qIndex];
        const names = {m1:"Whole Numbers", m2:"Decimal Cutters", m3:"Gap & Sub-units", m4:"Thematic Numbers"};
        document.getElementById('module-name').innerText = names[currentMod];
        document.getElementById('counter').innerText = `Q ${qIndex + 1}/3`;
        document.getElementById('q-text').innerText = q.q;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = txt;
            b.onclick = () => handleAnswer(i, q.a);
            box.appendChild(b);
        });
        document.getElementById('feedback-box').style.display = 'none';
        updateProgress();
    }

    function handleAnswer(choice, correct) {
        const fb = document.getElementById('feedback-box');
        fb.style.display = 'block';
        if(choice === correct) {
            fb.className = 'feedback correct';
            fb.innerHTML = 'CORRECT. <button class="btn-next" onclick="advance()">Next Question</button>';
        } else {
            fb.className = 'feedback wrong';
            fb.innerText = 'INCORRECT. Review the LC rules for this section.';
        }
    }

    function advance() {
        qIndex++;
        if(qIndex < 3) {
            renderQuestion();
        } else {
            const flow = {m1:'m2', m2:'m3', m3:'m4', m4:'shelf'};
            const next = flow[currentMod];
            if(next === 'shelf') showShelf();
            else initMod(next);
        }
    }

    function updateProgress() {
        const mods = ['m1','m2','m3','m4','shelf'];
        const base = mods.indexOf(currentMod) * 20;
        const sub = (qIndex / 3) * 20;
        document.getElementById('fill').style.width = (base + sub) + '%';
    }

    function showShelf() {
        document.getElementById('quiz-ui').classList.add('hidden');
        document.getElementById('shelf-ui').classList.remove('hidden');
        const area = document.getElementById('shelf-area');
        const items = [
            {id:0, t:"M 2 .B4 1990"}, {id:1, t:"M 2 .B42 1980"}, 
            {id:2, t:"M 2.1 .A2"}, {id:3, t:"M 3 .W6"}, {id:4, t:"M 3 .W6 2010"}
        ];
        items.sort(() => 0.5 - Math.random());
        area.innerHTML = '';
        items.forEach(item => {
            const d = document.createElement('div');
            d.className = 'book';
            d.draggable = true;
            d.innerText = item.t;
            d.dataset.id = item.id;
            d.addEventListener('dragstart', () => d.classList.add('dragging'));
            d.addEventListener('dragend', () => d.classList.remove('dragging'));
            area.appendChild(d);
        });

        area.addEventListener('dragover', e => {
            e.preventDefault();
            const drag = document.querySelector('.dragging');
            const target = [...area.querySelectorAll('.book:not(.dragging)')].find(c => {
                return e.clientY <= c.getBoundingClientRect().top + c.getBoundingClientRect().height / 2;
            });
            area.insertBefore(drag, target);
        });
        updateProgress();
    }

    function verifyShelf() {
        const order = [...document.querySelectorAll('.book')].map(b => parseInt(b.dataset.id));
        const win = order.every((v, i) => v === i);
        if(win) {
            document.getElementById('shelf-ui').classList.add('hidden');
            document.getElementById('win-ui').classList.remove('hidden');
            document.getElementById('fill').style.width = '100%';
        } else {
            const fb = document.getElementById('shelf-feedback');
            fb.style.display = 'block';
            fb.className = 'feedback wrong';
            fb.innerText = 'INCORRECT ORDER. Check M2 vs M2.1 and the Gap Rule.';
        }
    }

    initMod('m1');
</script>
</body>
</html>
