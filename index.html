<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shelf It Right</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.card { background:white; padding:20px; border-radius:10px; max-width:800px; margin:auto; }

.choice {
  display:inline-block;
  margin:10px;
  padding:10px;
  border:1px solid #ccc;
  cursor:pointer;
  border-radius:8px;
}

.label {
  border:2px solid #333;
  padding:10px;
  width:130px;
  text-align:center;
  margin:auto;
  font-weight:bold;
  line-height:1.6;
  background:#fff;
}

.dropzone {
  border:2px dashed #aaa;
  min-height:120px;
  width:150px;
  display:inline-block;
  margin:10px;
  vertical-align:top;
  padding:5px;
}

.drag { cursor:grab; }
.correct { background:#e3f9e5; }
.wrong { background:#fde8e8; }

button { margin-top:15px; padding:10px; }
</style>

</head>

<body>

<div class="card" id="app"></div>

<script>

let round = 0;
let score = 0;

function label(lines){
  return `<div class="label">${lines.join("<br>")}</div>`;
}

const rounds = [

{
lesson: `
<h3>What is a Score?</h3>

<p>A <strong>score</strong> is written music that shows <strong>all parts together</strong>.</p>

<p>In an orchestra score, you can see violin, cello, flute, and more — all at the same time.</p>

<p>A <strong>part</strong> shows <strong>only one instrument</strong>.</p>

<p><strong>Key idea:</strong><br>
Score = everything together<br>
Part = one instrument</p>
`,
question: "Which best describes a score?",
choices: [
"Music for one instrument",
"A written version showing all parts together",
"A recording"
],
answer: 1
},

{
lesson: `
<h3>Mini-Scores</h3>

<p>A <strong>mini-score</strong> is a smaller study version of a full score.</p>

<p>In this library, a lowercase <strong>m</strong> appears on its own line near the top.</p>

<p><strong>The m is read first.</strong></p>

<p>This tells you immediately: this is a mini-score.</p>
`,
question: "Which is a mini-score?",
choices: [
label(["Music","m","M","1010",".B585","op. 42"]),
label(["Music","M","1010",".B585","1998"]),
label(["Music","M","1010",".B585","violin"])
],
answer: 0
},

{
lesson: `
<h3>Reading Order</h3>

<p>Always read call numbers <strong>top to bottom</strong>.</p>

<p>If there is an <strong>m</strong>, it comes first.</p>

<p>Then follow the rest of the lines in order.</p>
`,
question: "Which comes first?",
choices: [
label(["Music","M","1000",".B4"]),
label(["Music","m","M","1000",".B4"]),
label(["Music","M","500",".B4"])
],
answer: 1
},

{
lesson: `
<h3>Whole Numbers</h3>

<p>After M, compare the whole number.</p>

<p><strong>Smaller numbers come first.</strong></p>
`,
question: "Which comes first?",
choices: [
label(["M","100"]),
label(["M","50"]),
label(["M","75"])
],
answer: 1
},

{
lesson: `
<h3>Cutters</h3>

<p>Cutter numbers are read like decimals.</p>

<p><strong>.B4 comes before .B45</strong></p>
`,
question: "Which comes first?",
choices: [
label([".B45"]),
label([".B4"]),
label([".B5"])
],
answer: 1
},

{
lesson: `
<h3>Second Cutter</h3>

<p>The second Cutter is also read like a decimal — even without a dot.</p>

<p><strong>T10 behaves like .10</strong></p>
`,
question: "Which comes first?",
choices: [
label(["T2"]),
label(["T10"]),
label(["T3"])
],
answer: 1
},

{
lesson: `
<h3>Line 4 Details</h3>

<p>Opus numbers and details help sort when everything else matches.</p>
`,
question: "Which comes first?",
choices: [
label(["op. 42"]),
label(["op. 5"]),
label(["op. 100"])
],
answer: 1
}

];

// ---------- NORMAL ROUNDS ----------

function render(){
if(round === rounds.length) return renderDrag();
if(round > rounds.length) return end();

let r = rounds[round];

document.getElementById("app").innerHTML = `
${r.lesson}
<p><strong>${r.question}</strong></p>
${r.choices.map((c,i)=>`
<div class="choice" onclick="answer(${i})">${c}</div>
`).join("")}
<p>Score: ${score}</p>
`;
}

function answer(i){
if(i === rounds[round].answer) score++;
round++;
render();
}

// ---------- DRAG ROUND ----------

const correctOrder = [
["Music","m","M","1010",".B585","op. 42"],
["Music","M","500",".B585","op. 42"],
["Music","M","1010",".B4","op. 42"],
["Music","M","1010",".B585","op. 100"]
];

let placed = [];

function renderDrag(){

placed = [];

let shuffled = [...correctOrder].sort(() => Math.random() - 0.5);

document.getElementById("app").innerHTML = `
<h3>Final Test</h3>
<p>Drag the call numbers into the correct order.</p>
<p>Feedback appears after each move.</p>

<div id="pool">
${shuffled.map((l,i)=>`
<div class="choice drag" draggable="true" id="item${i}" data-index='${JSON.stringify(l)}'>
${label(l)}
</div>
`).join("")}
</div>

<hr>

<div id="zones">
${[0,1,2,3].map(i=>`
<div class="dropzone" data-pos="${i}"></div>
`).join("")}
</div>

<p id="feedback"></p>
`;

enableDrag();
}

function enableDrag(){

document.querySelectorAll(".drag").forEach(el=>{
el.addEventListener("dragstart", e=>{
e.dataTransfer.setData("text", el.id);
});
});

document.querySelectorAll(".dropzone").forEach(zone=>{
zone.addEventListener("dragover", e=> e.preventDefault());

zone.addEventListener("drop", e=>{
e.preventDefault();

let id = e.dataTransfer.getData("text");
let el = document.getElementById(id);

if(zone.children.length > 0) return;

zone.appendChild(el);
checkPlacement(zone);
});
});
}

function checkPlacement(zone){

let pos = parseInt(zone.dataset.pos);
let placedLabel = JSON.parse(zone.firstChild.dataset.index);

placed[pos] = placedLabel;

let correct = true;

for(let i=0;i<=pos;i++){
if(JSON.stringify(placed[i]) !== JSON.stringify(correctOrder[i])){
correct = false;
break;
}
}

let feedback = document.getElementById("feedback");

if(correct){
zone.classList.add("correct");
feedback.innerText = "Correct so far.";
}else{
zone.classList.add("wrong");
feedback.innerText = "Not quite — check order (m, numbers, cutters, details).";
}

if(placed.filter(x=>x).length === 4){
end();
}
}

// ---------- END ----------

function end(){
document.getElementById("app").innerHTML = `
<h2>Done</h2>
<p>Final Score: ${score}/${rounds.length}</p>
<button onclick="location.reload()">Restart</button>
`;
}

render();

</script>

</body>
</html>
