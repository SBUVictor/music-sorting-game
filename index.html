<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Score Call Number Trainer</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --accent: #2563eb;
      --good: #166534;
      --good-bg: #dcfce7;
      --bad: #991b1b;
      --bad-bg: #fee2e2;
      --warn: #92400e;
      --warn-bg: #fef3c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2, h3 { margin-top: 0; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,.05);
      margin-bottom: 18px;
    }
    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .02em;
      background: #e5e7eb;
      color: #374151;
      margin-bottom: 10px;
    }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .col { flex: 1 1 320px; }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .hidden { display: none; }
    .progress {
      width: 100%;
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0 18px;
    }
    .progress > div {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .2s ease;
    }
    .choice {
      display: block;
      width: 100%;
      text-align: left;
      margin: 10px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: white;
      color: var(--ink);
      font-weight: 600;
    }
    .choice:hover { border-color: var(--accent); }
    .feedback {
      padding: 12px 14px;
      border-radius: 12px;
      margin-top: 12px;
      font-weight: 600;
    }
    .good { background: var(--good-bg); color: var(--good); }
    .bad { background: var(--bad-bg); color: var(--bad); }
    .warn { background: var(--warn-bg); color: var(--warn); }
    code.call {
      display: inline-block;
      background: #f3f4f6;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 14px;
      margin: 4px 4px 0 0;
    }
    .sortbank, .sortslots {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 70px;
      padding: 12px;
      border: 2px dashed var(--line);
      border-radius: 14px;
      background: #fafafa;
    }
    .draggable {
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      cursor: grab;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      min-width: 180px;
    }
    .slot {
      min-height: 62px;
      min-width: 180px;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 8px;
      background: white;
    }
    .slotlabel {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }
    ul.tight li { margin: 6px 0; }
    .small { color: var(--muted); font-size: 14px; }
    .rules pre {
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Music Score Call Number Trainer</h1>
    <div class="card">
      <div class="pill">Prototype</div>
      <p>This training tool teaches and tests local Music Library shelf logic for music scores. It starts simple, then moves to realistic score-style call numbers, and ends with a drag-and-drop ordering activity.</p>
      <div class="row">
        <div class="col"><button id="startBtn">Start Training</button></div>
        <div class="col"><button class="secondary" id="showRulesBtn">Show Sorting Rules Used Here</button></div>
      </div>
    </div>

    <div id="rulesCard" class="card hidden rules"></div>

    <div id="app" class="hidden">
      <div class="card">
        <div id="stageLabel" class="pill">Lesson 1</div>
        <div class="progress"><div id="bar"></div></div>
        <div id="screen"></div>
      </div>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');
    const screen = document.getElementById('screen');
    const stageLabel = document.getElementById('stageLabel');
    const bar = document.getElementById('bar');
    const rulesCard = document.getElementById('rulesCard');

    const state = {
      step: 0,
      score: 0,
      totalQuestions: 0
    };

    function romanToInt(r) {
      if (!r) return null;
      const map = {I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
      let total = 0, prev = 0;
      const s = String(r).toUpperCase().trim();
      if (/^\d+$/.test(s)) return parseInt(s,10);
      for (let i = s.length - 1; i >= 0; i--) {
        const v = map[s[i]] || 0;
        if (!v) return null;
        if (v < prev) total -= v; else total += v;
        prev = v;
      }
      return total || null;
    }

    function normalize(raw) {
      return raw
        .replace(/\bMusic\b/gi, '')
        .replace(/\s+/g, ' ')
        .replace(/\bSER\.?\s*/gi, 'SER.')
        .replace(/\bBD\.?\s*/gi, 'BD.')
        .replace(/\bV\.?\s*/gi, 'V.')
        .replace(/\bPTS?\.?\s*/gi, m => m.toUpperCase().startsWith('PTS') ? 'PTS.' : 'PT.')
        .replace(/\bFASC\.?\s*/gi, 'FASC.')
        .replace(/\bABT\.?\s*/gi, 'ABT.')
        .replace(/\bT\.?\s*/gi, 'T.')
        .trim()
        .toUpperCase();
    }

    function parseCutter(str) {
      const m = str.match(/\.([A-Z]{1,3})(\d+(?:\.\d+)?)([A-Z]?)/);
      if (!m) return null;
      return { letters: m[1], num: parseFloat(m[2]), suffix: m[3] || '' };
    }

    function parseCallNumber(raw) {
      const s = normalize(raw);
      const classMatch = s.match(/\b(MT|ML|M)\s*(\d+(?:\.\d+)?)/);
      const cutterMatches = [...s.matchAll(/\.([A-Z]{1,3})(\d+(?:\.\d+)?)([A-Z]?)/g)];
      const yearMatch = s.match(/\b(1[6-9]\d{2}|20\d{2})\b/);
      const serMatch = s.match(/\bSER\.([IVXLC]+|\d+)\b/);
      const bdMatch = s.match(/\bBD\.(\d+)/);
      const volMatch = s.match(/\bV\.(\d+)([A-Z]?)/);
      const ptMatch = s.match(/\bPT\.(\d+)/);
      const ptsMatch = s.match(/\bPTS\.(\d+)(?:-(\d+))?/);
      const fascMatch = s.match(/\bFASC\.(\d+)/);
      const abtMatch = s.match(/\bABT\.(\d+)/);
      const reiheMatch = s.match(/\bREIHE\s+([A-Z])/);
      const teilMatch = s.match(/\bT\.(\d+)/);
      const opusMatch = s.match(/\bOP\.?\s*(\d+[A-Z]?(?:\/\d+)?)\b/);
      const workNumMatch = s.match(/\b(K\.?|HOB\.?|BWV\.?|D\.?|RV\.?|WQ\.?|L\.?)(\s*\d+[A-Z]?(?::[A-Z0-9]+)?)/);
      const workMarkMatch = s.match(/\b([A-Z])\.([IVXLC]+):([A-Z0-9]+)\b/);

      const firstCutter = cutterMatches[0] ? { letters: cutterMatches[0][1], num: parseFloat(cutterMatches[0][2]), suffix: cutterMatches[0][3] || '' } : null;
      const secondCutter = cutterMatches[1] ? { letters: cutterMatches[1][1], num: parseFloat(cutterMatches[1][2]), suffix: cutterMatches[1][3] || '' } : null;

      return {
        raw,
        normalized: s,
        classLetters: classMatch ? classMatch[1] : '',
        whole: classMatch ? parseFloat(classMatch[2]) : Number.POSITIVE_INFINITY,
        firstCutter,
        secondCutter,
        year: yearMatch ? parseInt(yearMatch[1], 10) : null,
        line4: {
          opus: opusMatch ? opusMatch[1] : null,
          workNumLabel: workNumMatch ? workNumMatch[1].replace('.', '').trim() : null,
          workNumValue: workNumMatch ? workNumMatch[2].trim() : null,
          series: serMatch ? romanToInt(serMatch[1]) : null,
          band: bdMatch ? parseInt(bdMatch[1], 10) : null,
          volume: volMatch ? { n: parseInt(volMatch[1],10), suffix: volMatch[2] || '' } : null,
          part: ptMatch ? { start: parseInt(ptMatch[1],10), end: null } : (ptsMatch ? { start: parseInt(ptsMatch[1],10), end: ptsMatch[2] ? parseInt(ptsMatch[2],10) : null } : null),
          fasc: fascMatch ? parseInt(fascMatch[1],10) : null,
          abt: abtMatch ? parseInt(abtMatch[1],10) : null,
          reihe: reiheMatch ? reiheMatch[1] : null,
          teil: teilMatch ? parseInt(teilMatch[1],10) : null,
          workMark: workMarkMatch ? { prefix: workMarkMatch[1], roman: romanToInt(workMarkMatch[2]), suffix: workMarkMatch[3] } : null,
        }
      };
    }

    function compareStrings(a,b){ return String(a||'').localeCompare(String(b||'')); }
    function compareNums(a,b){
      const av = (a === null || a === undefined) ? -Infinity : a;
      const bv = (b === null || b === undefined) ? -Infinity : b;
      return av < bv ? -1 : av > bv ? 1 : 0;
    }
    function compareCutter(a,b){
      if (!a && !b) return 0;
      if (!a) return -1;
      if (!b) return 1;
      return compareStrings(a.letters,b.letters) || compareNums(a.num,b.num) || compareStrings(a.suffix,b.suffix);
    }
    function compareLine4(a,b){
      const x = a.line4, y = b.line4;
      return compareNums(x.abt, y.abt)
        || compareStrings(x.reihe, y.reihe)
        || compareNums(x.series, y.series)
        || compareNums(x.band, y.band)
        || compareNums(x.volume?.n, y.volume?.n)
        || compareStrings(x.volume?.suffix, y.volume?.suffix)
        || compareNums(x.part?.start, y.part?.start)
        || compareNums(x.part?.end, y.part?.end)
        || compareNums(x.fasc, y.fasc)
        || compareNums(x.teil, y.teil)
        || compareStrings(x.workNumLabel, y.workNumLabel)
        || compareStrings(x.workNumValue, y.workNumValue)
        || compareStrings(x.opus, y.opus)
        || compareStrings(x.workMark?.prefix, y.workMark?.prefix)
        || compareNums(x.workMark?.roman, y.workMark?.roman)
        || compareStrings(x.workMark?.suffix, y.workMark?.suffix);
    }
    function compareCallNumbers(rawA, rawB){
      const a = typeof rawA === 'string' ? parseCallNumber(rawA) : rawA;
      const b = typeof rawB === 'string' ? parseCallNumber(rawB) : rawB;
      return compareStrings(a.classLetters, b.classLetters)
        || compareNums(a.whole, b.whole)
        || compareCutter(a.firstCutter, b.firstCutter)
        || compareCutter(a.secondCutter, b.secondCutter)
        || compareNums(a.year, b.year)
        || compareLine4(a,b);
    }
    function sortCalls(arr){ return [...arr].sort(compareCallNumbers); }

    const rulesText = `Local practice used in this prototype\n\n1. Read the class and whole number first.\n   Example: M 2 comes before M 2.3, which comes before M 3.\n\n2. First cutter is read as a decimal.\n   Example: .B103 comes before .B1133, and .C4 comes after .B88R.\n\n3. Second cutter, if present, is compared after the first cutter.\n\n4. Year is compared after the main cutters.\n\n5. Line-four or trailing details are compared after the earlier lines. In this prototype, those details are handled in this order:\n   ABT / REIHE / SER. / BD. / V. / PT. or PTS. / FASC. / T. / thematic or work-number style details / opus-style details / structured work marks like H.III:E2.\n\n6. Roman numerals are converted to numbers for sorting.\n   Example: SER.I before SER.II before SER.VI.\n\n7. The purpose here is training for local shelf logic, not generic LC theory in the abstract. If local practice changes, the rule order here should be updated and re-tested.`;

    document.getElementById('showRulesBtn').addEventListener('click', () => {
      rulesCard.classList.toggle('hidden');
      rulesCard.innerHTML = `<h2>Sorting Rules Used in This Prototype</h2><pre>${rulesText}</pre>`;
    });

    const lessons = [
      {
        type: 'teach',
        label: 'Lesson 1',
        title: 'Whole numbers come first',
        html: `
          <h2>Whole numbers first</h2>
          <p>Start with the class and whole number. In this tool, <code class="call">M 2</code> comes before <code class="call">M 2.3</code>, and both come before <code class="call">M 3</code>.</p>
          <ul class="tight">
            <li>Read the number carefully.</li>
            <li>Do not jump ahead to cutters until the whole number is settled.</li>
            <li>Decimals matter.</li>
          </ul>
        `
      },
      {
        type: 'quiz',
        label: 'Quiz 1',
        question: 'Which call number comes first?',
        choices: ['M 3 .B88R', 'M 2.3 .U6', 'M 452 .H42'],
        answer: 1,
        explain: 'M 2.3 comes before M 3, and both come before M 452.'
      },
      {
        type: 'teach',
        label: 'Lesson 2',
        title: 'First cutter is read as a decimal',
        html: `
          <h2>First cutter</h2>
          <p>The first cutter is compared after the whole number, and it is read as a decimal. Think letter first, then the number after it as a decimal-style sequence.</p>
          <p>Example order within <code class="call">M 3</code>:</p>
          <p><code class="call">.B103</code> before <code class="call">.B1133</code> before <code class="call">.C4</code></p>
        `
      },
      {
        type: 'quiz',
        label: 'Quiz 2',
        question: 'Put these in order by choosing the earliest one.',
        choices: ['M 3 .C4', 'M 3 .B1133', 'M 3 .H26'],
        answer: 1,
        explain: 'Within the same whole number, compare the first cutter. B comes before C and H.'
      },
      {
        type: 'teach',
        label: 'Lesson 3',
        title: 'Second cutter and year',
        html: `
          <h2>Second cutter and year</h2>
          <p>If the first cutter is the same, compare the second cutter. If the cutters are the same, compare the year.</p>
          <ul class="tight">
            <li>Line 1: class and whole number</li>
            <li>Line 2: first cutter</li>
            <li>Line 3: second cutter when present</li>
            <li>Then year</li>
          </ul>
        `
      },
      {
        type: 'quiz',
        label: 'Quiz 3',
        question: 'Which comes first under the local logic used here?',
        choices: ['M 3 .O35 1994 SER.II FASC.3', 'M 3 .O35 2001 SER.II FASC.3', 'M 3 .S36 ABT.5 REIHE B BD.26 T.2'],
        answer: 0,
        explain: 'Same whole number and first cutter for the first two, so compare year: 1994 comes before 2001.'
      },
      {
        type: 'teach',
        label: 'Lesson 4',
        title: 'Line-four details matter',
        html: `
          <h2>Line-four details</h2>
          <p>After the earlier lines are settled, compare line-four details such as series, band, volume, part, fascicle, section, and other music-specific numbering details.</p>
          <p>Roman numerals are treated as numbers. So <code class="call">SER.I</code> comes before <code class="call">SER.II</code> and both come before <code class="call">SER.VI</code>.</p>
          <p>This prototype also recognizes details such as <code class="call">BD.20</code>, <code class="call">V.69A</code>, <code class="call">PTS.1-6</code>, and work-mark style elements like <code class="call">H.III:E2</code>.</p>
        `
      },
      {
        type: 'quiz',
        label: 'Quiz 4',
        question: 'Which comes first?',
        choices: ['M 3 .B1133 SER.I BD.32 PT.1', 'M 3 .B1133 SER.VI BD.32 PT.1', 'M 3 .B1133 SER.II BD.32 PT.1'],
        answer: 0,
        explain: 'Roman numerals are converted to numbers. SER.I comes before SER.II, which comes before SER.VI.'
      },
      {
        type: 'quiz',
        label: 'Quiz 5',
        question: 'Which call number should shelve first?',
        choices: ['M 3 .B88R BD.20 PTS.1-6', 'M 3 .C4 1993 SER.VI V.69A', 'M 3 .B103 2005 SER.8 V.2'],
        answer: 2,
        explain: 'All are M 3, so compare the first cutter. .B103 comes before .B88R and before .C4.'
      },
      {
        type: 'drag',
        label: 'Final Activity',
        title: 'Place these realistic music score call numbers in correct order',
        items: [
          'M 3 .C4 1993 SER.VI V.69A',
          'M 3 .B103 2005 SER.8 V.2',
          'M 2 .G39 1966 BD.23',
          'M 3 .B88R BD.20 PTS.1-6',
          'M 452 .H42 H.III:E2'
        ]
      },
      {
        type: 'done',
        label: 'Complete'
      }
    ];

    state.totalQuestions = lessons.filter(x => x.type === 'quiz').length + 1;

    function setProgress(){
      bar.style.width = `${(state.step)/(lessons.length-1)*100}%`;
    }

    function nextStep(){
      state.step++;
      render();
    }

    function renderTeach(lesson){
      screen.innerHTML = `
        <h2>${lesson.title}</h2>
        ${lesson.html}
        <button id="next">Continue</button>
      `;
      document.getElementById('next').onclick = nextStep;
    }

    function renderQuiz(lesson){
      screen.innerHTML = `
        <h2>${lesson.question}</h2>
        <div id="choices"></div>
        <div id="feedback"></div>
      `;
      const choices = document.getElementById('choices');
      const feedback = document.getElementById('feedback');
      lesson.choices.forEach((choice, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = choice;
        btn.onclick = () => {
          const correct = i === lesson.answer;
          if (correct) state.score++;
          feedback.className = `feedback ${correct ? 'good' : 'bad'}`;
          feedback.innerHTML = `${correct ? 'Correct.' : 'Not quite.'} ${lesson.explain}<br><br><button id="nextQ">Continue</button>`;
          [...choices.querySelectorAll('button')].forEach(b => b.disabled = true);
          document.getElementById('nextQ').onclick = nextStep;
        };
        choices.appendChild(btn);
      });
    }

    function shuffle(arr){ return [...arr].sort(() => Math.random() - 0.5); }

    function renderDrag(lesson){
      const shuffled = shuffle(lesson.items);
      const correct = sortCalls(lesson.items);
      screen.innerHTML = `
        <h2>${lesson.title}</h2>
        <p class="small">Drag each call number into the slots from first to last according to the local shelf logic used in this prototype.</p>
        <h3>Call number bank</h3>
        <div class="sortbank" id="bank"></div>
        <h3>Order slots</h3>
        <div class="sortslots" id="slots"></div>
        <div id="dragFeedback"></div>
        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
          <button id="checkDrag">Check Order</button>
          <button id="resetDrag" class="secondary">Reset</button>
        </div>
      `;
      const bank = document.getElementById('bank');
      const slots = document.getElementById('slots');
      const dragFeedback = document.getElementById('dragFeedback');

      shuffled.forEach((item, idx) => bank.appendChild(makeDraggable(item, `item-${idx}`)));
      lesson.items.forEach((_, i) => slots.appendChild(makeSlot(i+1)));
      enableDnD();

      document.getElementById('resetDrag').onclick = () => renderDrag(lesson);
      document.getElementById('checkDrag').onclick = () => {
        const chosen = [...slots.querySelectorAll('.slot')].map(slot => slot.querySelector('.draggable')?.dataset.value).filter(Boolean);
        if (chosen.length !== lesson.items.length) {
          dragFeedback.className = 'feedback warn';
          dragFeedback.textContent = 'Please place every call number into a slot before checking.';
          return;
        }
        const ok = chosen.every((x,i) => x === correct[i]);
        if (ok) state.score++;
        dragFeedback.className = `feedback ${ok ? 'good' : 'bad'}`;
        dragFeedback.innerHTML = ok
          ? `Correct. You placed the scores in the right order.<br><br><button id="finishBtn">Finish</button>`
          : `Not quite. Correct order:<br>${correct.map(x => `<code class="call">${x}</code>`).join(' ')}<br><br><button id="finishBtn">Continue</button>`;
        document.getElementById('finishBtn').onclick = nextStep;
      };
    }

    function makeDraggable(text, id){
      const div = document.createElement('div');
      div.className = 'draggable';
      div.draggable = true;
      div.id = id;
      div.dataset.value = text;
      div.textContent = text;
      return div;
    }

    function makeSlot(n){
      const div = document.createElement('div');
      div.className = 'slot';
      div.innerHTML = `<div class="slotlabel">Position ${n}</div>`;
      return div;
    }

    function enableDnD(){
      document.querySelectorAll('.draggable').forEach(el => {
        el.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', el.id));
      });
      document.querySelectorAll('.slot, .sortbank').forEach(target => {
        target.addEventListener('dragover', e => e.preventDefault());
        target.addEventListener('drop', e => {
          e.preventDefault();
          const id = e.dataTransfer.getData('text/plain');
          const el = document.getElementById(id);
          if (!el) return;
          if (target.classList.contains('slot')) {
            const existing = target.querySelector('.draggable');
            if (existing) document.getElementById('bank').appendChild(existing);
            target.appendChild(el);
          } else {
            target.appendChild(el);
          }
        });
      });
    }

    function renderDone(){
      screen.innerHTML = `
        <h2>Training complete</h2>
        <p>You completed the prototype training sequence.</p>
        <div class="feedback good">Score: ${state.score} / ${state.totalQuestions}</div>
        <p>This version is testable and meant to be checked against local Music Library practice. Before finalizing, the sorting rules, examples, and feedback language should be reviewed with you and adjusted where needed.</p>
        <div class="row">
          <div class="col"><button id="restartBtn">Restart</button></div>
          <div class="col"><button class="secondary" id="rulesAgainBtn">Review Rules</button></div>
        </div>
      `;
      document.getElementById('restartBtn').onclick = () => { state.step = 0; state.score = 0; render(); };
      document.getElementById('rulesAgainBtn').onclick = () => {
        rulesCard.classList.remove('hidden');
        rulesCard.innerHTML = `<h2>Sorting Rules Used in This Prototype</h2><pre>${rulesText}</pre>`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
    }

    function render(){
      app.classList.remove('hidden');
      const lesson = lessons[state.step];
      stageLabel.textContent = lesson.label;
      setProgress();
      if (lesson.type === 'teach') return renderTeach(lesson);
      if (lesson.type === 'quiz') return renderQuiz(lesson);
      if (lesson.type === 'drag') return renderDrag(lesson);
      if (lesson.type === 'done') return renderDone();
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      state.step = 0;
      state.score = 0;
      render();
    });
  </script>
</body>
</html>
