<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shelf It Right</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:40px;
}

.card {
  background:white;
  padding:30px;
  border-radius:12px;
  max-width:800px;
  margin:auto;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h2 { margin-top:0; }

.choice {
  display:inline-block;
  margin:10px;
  padding:15px 20px;
  border:1px solid #ccc;
  border-radius:8px;
  cursor:pointer;
  background:white;
}

.choice:hover {
  background:#eef4ff;
}

.correct { background:#e3f9e5 !important; }
.wrong { background:#fde8e8 !important; }

.callbox {
  border:2px solid #333;
  padding:10px;
  width:120px;
  margin:auto;
  text-align:center;
  font-weight:bold;
}

.score {
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card" id="app"></div>

<script>

let score = 0;

function renderLesson() {
  document.getElementById("app").innerHTML = `
    <h2>Reading Order</h2>

    <p>Always read from <strong>top to bottom</strong>.</p>

    <p>If there is a lowercase <strong>m</strong>, it appears as its own line 
    and is read in that position — not as part of the year.</p>

    <p>You are comparing what is physically printed on the label.</p>

    <button onclick="renderQuestion()">Continue</button>
  `;
}

function renderQuestion() {
  document.getElementById("app").innerHTML = `
    <h2>Which Comes First?</h2>

    <div style="display:flex; justify-content:space-around;">

      <div class="choice" onclick="answer(0)">
        <div class="callbox">
          Music<br>
          m<br>
          M<br>
          1010<br>
          .B585
        </div>
      </div>

      <div class="choice" onclick="answer(1)">
        <div class="callbox">
          Music<br>
          M<br>
          1010<br>
          .B585
        </div>
      </div>

      <div class="choice" onclick="answer(2)">
        <div class="callbox">
          Music<br>
          M<br>
          500<br>
          .B4
        </div>
      </div>

    </div>

    <div class="score">Score: ${score}</div>
  `;
}

function answer(i) {
  let correct = 0;

  const choices = document.querySelectorAll(".choice");

  choices.forEach((c, index) => {
    if (index === correct) c.classList.add("correct");
    if (index === i && i !== correct) c.classList.add("wrong");
  });

  if (i === correct) score++;

  setTimeout(() => {
    renderEnd();
  }, 1200);
}

function renderEnd() {
  document.getElementById("app").innerHTML = `
    <h2>Done</h2>
    <p>Score: ${score}/1</p>
    <button onclick="location.reload()">Restart</button>
  `;
}

renderLesson();

</script>

</body>
</html>
