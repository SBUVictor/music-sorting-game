<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shelf It Right — Music Score Training</title>
<style>
body { font-family: Arial; background:#f4f6f8; margin:0; padding:20px; }
.card { background:white; padding:20px; border-radius:12px; max-width:800px; margin:auto; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
.label { border:2px solid #000; padding:10px; margin:10px; background:#fff; cursor:grab; }
.dropzone { border:2px dashed #aaa; padding:10px; min-height:60px; margin:10px; }
.correct { background:#e3f9e5; }
.wrong { background:#fde8e8; }
</style>
</head>

<body>
<div class="card" id="app"></div>

<script>

let stage = 0;

function start() {
document.getElementById("app").innerHTML = `
<h2>Shelf It Right</h2>
<p><strong>A score</strong> is the written music of a piece showing multiple parts together.</p>
<p>A <strong>mini-score</strong> is a smaller study version. A lowercase <strong>m</strong> (like m1998) tells you it's a mini-score.</p>
<p>Cutters (like .B4 or T10) are read like decimals — even when there is no dot.</p>
<button onclick="finalTest()">Start Final Test</button>
`;
}

function finalTest() {
stage = 1;

document.getElementById("app").innerHTML = `
<h2>Final Test — Put in Order</h2>
<p>Drag the call numbers into the correct order (top = first on shelf)</p>

<div id="choices">
<div class="label" draggable="true">M<br>300<br>.A2<br>T2<br>2005</div>
<div class="label" draggable="true">M<br>300<br>.A2<br>T10<br>2005</div>
<div class="label" draggable="true">M<br>300<br>.A2<br>T3<br>2005</div>
<div class="label" draggable="true">M<br>300<br>.A2<br>T2<br>1998</div>
</div>

<h3>Drop here in order:</h3>

<div class="dropzone"></div>
<div class="dropzone"></div>
<div class="dropzone"></div>
<div class="dropzone"></div>

<button onclick="checkOrder()">Check Order</button>
<div id="result"></div>
`;

enableDrag();
}

let dragged;

function enableDrag() {
document.querySelectorAll(".label").forEach(el => {
el.addEventListener("dragstart", e => dragged = el);
});

document.querySelectorAll(".dropzone").forEach(zone => {
zone.addEventListener("dragover", e => e.preventDefault());
zone.addEventListener("drop", function() {
this.innerHTML = "";
this.appendChild(dragged);
});
});
}

function checkOrder() {
let zones = document.querySelectorAll(".dropzone");
let order = Array.from(zones).map(z => z.textContent.trim());

let correct = [
"M300.A2T102005",
"M300.A2T21998",
"M300.A2T22005",
"M300.A2T32005"
];

let cleaned = order.map(o => o.replace(/\\s+/g,''));

let result = document.getElementById("result");

if(JSON.stringify(cleaned) === JSON.stringify(correct)) {
result.innerHTML = "<p class='correct'>Correct. You’ve got it.</p>";
} else {
result.innerHTML = "<p class='wrong'>Not quite. Remember: second Cutter is decimal logic (T10 comes before T2).</p>";
}
}

start();

</script>
</body>
</html>
