<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBU Music Library | Shelf Training</title>
  <style>
    :root { --sbu-red: #990000; --cream: #F8F2C5; --black: #000; --gray: #ddd; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
    .card { background: white; max-width: 850px; margin: 0 auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--gray); }
    .pill { display: inline-block; padding: 5px 15px; border: 2px solid var(--sbu-red); color: var(--sbu-red); border-radius: 50px; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
    .progress-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
    #progress { height: 100%; width: 0%; background: var(--sbu-red); transition: width 0.4s; }
    .lesson-box { background: var(--cream); border-left: 6px solid var(--sbu-red); padding: 20px; margin: 25px 0; border-radius: 0 12px 12px 0; }
    button { background: var(--sbu-red); color: white; border: none; padding: 16px 32px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    button:hover { background: #700; transform: translateY(-1px); }
    .choice { display: block; width: 100%; text-align: left; background: white; border: 1px solid var(--gray); margin-bottom: 12px; padding: 20px; border-radius: 12px; font-size: 1.1rem; }
    .choice:hover { background: var(--cream); border-color: var(--sbu-red); }
    .feedback { padding: 20px; border-radius: 12px; margin-top: 20px; font-weight: bold; }
    .correct { background: #e7f3ef; color: #104247; border: 1px solid #104247; }
    .incorrect { background: #fff1f1; color: #b91c1c; border: 1px solid #f87171; }
    .drag-item { padding: 15px; background: white; border: 2px solid #ddd; border-radius: 10px; cursor: grab; margin-bottom: 10px; font-family: monospace; font-weight: bold; font-size: 1.1rem; }
    .dragging { opacity: 0.4; background: var(--cream); }
    .hidden { display: none !important; }
    code { background: #eee; padding: 2px 5px; border-radius: 4px; font-weight: bold; }
  </style>
</head>
<body>

<div class="card">
  <div id="landing">
    <div class="pill">Staff Training</div>
    <h1>Shelf It Right</h1>
    <p>Welcome. This tool will walk you through the logic of the SBU Music Library shelving system. Master the rules, pass the assessment, and keep the stacks organized.</p>
    <button onclick="start()">Start Training</button>
  </div>

  <div id="app" class="hidden">
    <div id="mod-tag" class="pill">Module</div>
    <div class="progress-bar"><div id="progress"></div></div>
    <div id="content"></div>
  </div>
</div>

<script>
const trainingData = [
  {
    title: "Module X: Music Catalogs",
    type: "quiz",
    lesson: `<h2>Thematic Catalogs & Work IDs</h2>
             <div class="lesson-box">
               <b>The Golden Rule:</b> Work IDs identify specific pieces but are <u>never</u> used for shelving.<br><br>
               <b>Composer-Specific Labels:</b> BWV (Bach), KV (Mozart), Hob. (Haydn), RV (Vivaldi).<br><br>
               <b>General Labels:</b> <u>WoO</u> stands for "Works without opus number" and is used for many different composers.
             </div>`,
    questions: [
      { q: "Which label is a general designation used for many different composers?", c: ["BWV", "KV (or K)", "WoO", "Hob."], a: 2, e: "Correct. WoO is a general label." },
      { q: "Which thematic catalog is specific to Wolfgang Amadeus Mozart?", c: ["BWV", "KV (or K)", "Hob.", "RV"], a: 1, e: "Correct. Mozart uses KV." }
    ]
  },
  {
    title: "Module 1: Whole Numbers",
    type: "quiz",
    lesson: `<h2>Rule 1: Whole Numbers</h2>
             <p>Call numbers begin with a Class (M) followed by a <b>Whole Number</b>.</p>
             <div class="lesson-box">
               Count them mathematically. <b>M 14.5</b> comes before <b>M 15</b>.
             </div>`,
    questions: [
      { q: "Which call number comes first on the shelf?", c: ["M 14.5 .S4", "M 15 .A2"], a: 0, e: "Correct. 14.5 is smaller than 15." }
    ]
  },
  {
    title: "Module 3: Years & Later Details",
    type: "quiz",
    lesson: `<h2>Rule 3: Sorting After the Year</h2>
             <p>After the Cutter and Year, we sort by sub-units like Series or Fascicles.</p>
             <div class="lesson-box">
               <b>1. Alphabetical Order:</b> FASC. (Fascicle) comes before SER. (Series).<br><br>
               <b>2. Roman Numerals:</b> Use standard order (I, II, III, IV, V, VI). <b>SER. I</b> comes before <b>SER. VI</b>.
             </div>`,
    questions: [
      { q: "Which call number comes first?", c: ["M 452 .S36 2005 SER.VI", "M 452 .S36 2005 FASC.3", "M 452 .S36 2005 SER.I"], a: 1, e: "Correct. 'F' (Fascicle) comes before 'S' (Series) alphabetically." }
    ]
  },
  {
    title: "Final Assessment",
    type: "drag",
    lesson: `<h2>Final Performance Check</h2>
             <p>Drag and drop these call numbers into the correct shelf order (Top to Bottom).</p>`,
    items: [
      { text: "M 2 .G39 1966 BD.23", r: 0 },
      { text: "M 2.3 .U6 R4 V.66", r: 1 },
      { text: "M 3 .B103 2005 SER.8", r: 2 },
      { text: "M 3 .C4 1993 SER.VI", r: 3 }
    ]
  }
];

let state = { mod: 0, phase: 'teach', qIdx: 0 };

function start() {
  document.getElementById('landing').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  render();
}

function render() {
  if (state.mod >= trainingData.length) { finish(); return; }
  const mod = trainingData[state.mod];
  document.getElementById('mod-tag').textContent = mod.title;
  document.getElementById('progress').style.width = (state.mod / trainingData.length * 100) + "%";
  const content = document.getElementById('content');

  if (state.phase === 'teach') {
    content.innerHTML = mod.lesson + `<button onclick="state.phase='test';render()">Start Practice</button>`;
  } else if (mod.type === 'quiz') {
    const q = mod.questions[state.qIdx];
    content.innerHTML = `<h3>Practice</h3><p><b>${q.q}</b></p>` + 
      q.c.map((opt, i) => `<button class="choice" onclick="check(${i})">${opt}</button>`).join('') + `<div id="feedback"></div>`;
  } else {
    renderDrag(mod);
  }
}

function check(i) {
  const q = trainingData[state.mod].questions[state.qIdx];
  const fb = document.getElementById('feedback');
  if (i === q.a) {
    state.qIdx++;
    fb.innerHTML = `<div class="feedback correct">Correct! ${q.e}</div>` + 
      (state.qIdx >= trainingData[state.mod].questions.length ? `<button onclick="nextMod()">Next Module</button>` : `<button onclick="render()">Continue</button>`);
  } else {
    fb.innerHTML = `<div class="feedback incorrect">Not quite. Let's review the rule.</div><button onclick="state.phase='teach';state.qIdx=0;render()">Review Lesson</button>`;
  }
}

function renderDrag(mod) {
  const content = document.getElementById('content');
  content.innerHTML = `<div id="dz"></div><button onclick="checkDrag()">Verify Shelf Order</button><div id="feedback"></div>`;
  const dz = document.getElementById('dz');
  [...mod.items].sort(() => Math.random() - 0.5).forEach(item => {
    const el = document.createElement('div');
    el.className = 'drag-item'; el.draggable = true; el.dataset.r = item.r;
    el.innerHTML = `☰ &nbsp; <code>${item.text}</code>`;
    el.addEventListener('dragstart', () => el.classList.add('dragging'));
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    dz.appendChild(el);
  });
  dz.addEventListener('dragover', e => {
    e.preventDefault();
    const drag = document.querySelector('.dragging');
    const next = [...dz.querySelectorAll('.drag-item:not(.dragging)')].find(s => e.clientY <= s.getBoundingClientRect().top + s.getBoundingClientRect().height / 2);
    dz.insertBefore(drag, next);
  });
}

function checkDrag() {
  const items = [...document.querySelectorAll('.drag-item')];
  const win = items.every((el, i) => parseInt(el.dataset.r) === i);
  const fb = document.getElementById('feedback');
  if (win) fb.innerHTML = `<div class="feedback correct">Perfect! You've mastered the sequence.</div><button onclick="nextMod()">Finish Training</button>`;
  else fb.innerHTML = `<div class="feedback incorrect">The order is still incorrect. Remember: Whole Numbers first, then Decimals.</div>`;
}

function nextMod() { state.mod++; state.phase = 'teach'; state.qIdx = 0; render(); }
function finish() { document.getElementById('content').innerHTML = `<h2>Training Complete!</h2><p>You have successfully completed the music library shelving certification.</p><button onclick="location.reload()">Restart Session</button>`; }
</script>

</body>
</html>
