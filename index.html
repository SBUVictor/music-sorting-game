<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shelf It Right - Stable Mini Lesson</title>

<style>
body { font-family: Arial; background:#f4f7fb; padding:20px; }
.card { max-width:800px; margin:auto; background:white; padding:25px; border-radius:12px; }
button { padding:10px; margin:5px; cursor:pointer; }
.choice { display:block; width:100%; }
.feedback { margin-top:10px; font-weight:bold; }
.good { color:green; }
.bad { color:red; }
.hidden { display:none; }
.box { border:1px solid #ddd; padding:12px; margin:10px 0; border-radius:8px; }
</style>
</head>

<body>

<div class="card">

<h2>Shelf It Right</h2>

<div id="setup">
<input id="name" placeholder="Name"><br>
<input id="email" placeholder="name@stonybrook.edu"><br>
<button onclick="start()">Start Training</button>
</div>

<div id="app" class="hidden"></div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwUoY2_eFLWVWyw5JX7Vv15ZdbDYYkYceQ_fpn0sZPGb3gpCtsrPfe3i_iItmv3ZFdiPA/exec";

let state = {
  step:0,
  phase:"teach",
  qIndex:0,
  score:0,
  name:"",
  email:"",
  teachPassed:false
};

const modules = [

{
title:"Module 1 - Whole Number",
teach: `
<strong>Rule:</strong> Always compare the whole number first.<br><br>
Ignore everything else at first.<br><br>

Example:<br>
M 2.3 .U6<br>
M 3 .B103<br><br>

👉 2.3 comes before 3<br><br>

<strong>Common mistake:</strong><br>
Looking at letters first.
`,
check:["M 3","M 2.3",1],
worked:"M 2.3 comes before M 3",
questions:[
["Which first?","M 3","M 2.3",1],
["Which first?","M 2","M 3",0],
["Which first?","M 452","M 3",1],
["Which first?","M 2.1","M 2.3",0],
["Which first?","M 5","M 12",0],
["Which first?","M 9","M 2",1],
["Which first?","M 1","M 1.5",0],
["Which first?","M 100","M 50",1],
["Which first?","M 3","M 3.1",0],
["Which first?","M 2.9","M 2.1",1]
]
},

{
title:"Module 2 - Cutter",
teach: `
<strong>Rule:</strong> If whole number matches, use cutter.<br><br>

Example:<br>
M 3 .B<br>
M 3 .C<br><br>

👉 B comes before C<br><br>

<strong>Common mistake:</strong><br>
Comparing numbers before letters.
`,
check:["M 3 .C","M 3 .B",1],
worked:".B comes before .C",
questions:[
["Which first?","M 3 .C","M 3 .B",1],
["Which first?","M 3 .A","M 3 .B",0],
["Which first?","M 3 .D","M 3 .C",1],
["Which first?","M 3 .B2","M 3 .B10",0],
["Which first?","M 3 .S2","M 3 .S1",1],
["Which first?","M 3 .H","M 3 .G",1],
["Which first?","M 3 .A9","M 3 .A2",1],
["Which first?","M 3 .Z","M 3 .Y",1],
["Which first?","M 3 .C3","M 3 .C4",0],
["Which first?","M 3 .M","M 3 .L",1]
]
},

{
title:"Module 3 - Details",
teach: `
<strong>Rule:</strong> If everything matches, use details.<br><br>

Example:<br>
1994 vs 2001 → 1994 first<br><br>

<strong>Common mistake:</strong><br>
Ignoring Roman numerals.
`,
check:["2001","1994",1],
worked:"1994 comes before 2001",
questions:[
["Which first?","1994","2001",0],
["Which first?","SER.I","SER.II",0],
["Which first?","SER.V","SER.II",1],
["Which first?","1990","1980",1],
["Which first?","VOL 1","VOL 2",0],
["Which first?","PT 2","PT 1",1],
["Which first?","SER.I","SER.VI",0],
["Which first?","2000","1999",1],
["Which first?","FASC.2","FASC.3",0],
["Which first?","III","II",1]
]
}

];

function start(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  if(!name) return alert("Enter name");
  if(!email.includes("@stonybrook.edu")) return alert("Use SBU email");

  state.name = name;
  state.email = email;

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  render();
}

function render(){
  const app = document.getElementById("app");

  if(state.step >= modules.length){
    renderFinal();
    return;
  }

  const mod = modules[state.step];

  if(state.phase==="teach"){
    app.innerHTML = `
      <h2>${mod.title}</h2>
      <div class="box">${mod.teach}</div>

      <p><strong>Check (must be correct):</strong></p>

      <button class="choice" onclick="teachCheck(0)">${mod.check[0]}</button>
      <button class="choice" onclick="teachCheck(1)">${mod.check[1]}</button>

      <div id="fb"></div>
    `;
  }

  else if(state.phase==="worked"){
    app.innerHTML = `
      <h2>Worked Example</h2>
      <div class="box">${mod.worked}</div>
      <button onclick="nextPhase('quiz')">Continue</button>
    `;
  }

  else{
    const q = mod.questions[state.qIndex];

    app.innerHTML = `
      <h2>${mod.title}</h2>
      <p>${q[0]}</p>

      <button class="choice" onclick="answer(0)">${q[1]}</button>
      <button class="choice" onclick="answer(1)">${q[2]}</button>

      <div id="fb"></div>
    `;
  }
}

function teachCheck(choice){
  const mod = modules[state.step];
  const fb = document.getElementById("fb");

  if(choice === mod.check[2]){
    fb.innerHTML = "Correct";
    state.phase = "worked";
    setTimeout(render,500);
  } else {
    fb.innerHTML = "Try again";
  }
}

function nextPhase(p){
  state.phase = p;
  render();
}

function answer(choice){
  const q = modules[state.step].questions[state.qIndex];
  const fb = document.getElementById("fb");

  if(choice === q[3]){
    state.score++;
    fb.innerHTML = "Correct";
  } else {
    fb.innerHTML = "Wrong";
  }

  setTimeout(()=>{
    state.qIndex++;

    if(state.qIndex >= 10){
      state.step++;
      state.qIndex = 0;
      state.phase = "teach";
    }

    render();
  },600);
}

function renderFinal(){
  const app = document.getElementById("app");

  app.innerHTML = `
    <h2>Final Activity</h2>
    <p>Drag order mentally (simplified final for stability)</p>
    <p>Correct order:</p>
    M 2 → M 2.3 → M 3 → M 452

    <br><br>
    <button onclick="finish()">Finish</button>
  `;
}

function finish(){
  submit();
}

async function submit(){
  await fetch(SCRIPT_URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      realName: state.name,
      preferredName: state.name,
      sbuEmail: state.email,
      totalScore: state.score,
      passFail: "Pass",
      attemptCount: 1
    })
  });

  document.getElementById("app").innerHTML = `
    <h2>Done</h2>
    <p>Score: ${state.score}</p>
    <p>Submitted</p>
  `;
}

</script>

</body>
</html>
