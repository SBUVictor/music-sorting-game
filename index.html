<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shelf It Right | Stony Brook Music Library</title>
  <style>
    :root {
      --sbu-red: #990000; --sbu-black: #000000; --sbu-cream: #F8F2C5; 
      --sbu-light-gray: #BEBEBE; --sbu-celery: #BCCF9D; --sbu-forest: #104247;
    }
    body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fdfdfd; color: var(--sbu-black); line-height: 1.6; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    .card { background: #fff; border: 1px solid var(--sbu-light-gray); border-radius: 24px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); margin-bottom: 25px; }
    .pill { display: inline-block; padding: 6px 14px; border-radius: 50px; border: 2px solid var(--sbu-red); color: var(--sbu-red); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 15px; }
    .progress { width: 100%; height: 10px; background: #eee; border-radius: 20px; margin-bottom: 30px; overflow: hidden; }
    #bar { height: 100%; width: 0%; background: var(--sbu-red); transition: width 0.4s ease; }
    h2 { color: var(--sbu-red); font-size: 1.8rem; margin-top: 0; }
    .instruction { background: var(--sbu-cream); padding: 20px; border-radius: 12px; border-left: 6px solid var(--sbu-red); margin: 20px 0; }
    button { background: var(--sbu-red); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; }
    button.choice { display: block; width: 100%; text-align: left; background: white; color: black; border: 1px solid #ddd; margin-bottom: 12px; padding: 18px; transition: 0.2s; }
    button.choice:hover { background: var(--sbu-cream); border-color: var(--sbu-red); }
    .feedback { padding: 18px; border-radius: 12px; margin-top: 20px; font-weight: bold; border: 1px solid transparent; }
    .good { background: var(--sbu-celery); color: var(--sbu-forest); border-color: var(--sbu-forest); }
    .bad { background: #fff1f1; color: #b91c1c; border-color: #f87171; }
    code { background: #f4f4f4; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-weight: bold; }
    .drag-item { padding: 15px; background: white; border: 2px solid #ddd; border-radius: 10px; cursor: grab; margin-bottom: 8px; font-weight: bold; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="landing" class="card">
      <div class="pill">Stony Brook University</div>
      <h1>Shelf It Right</h1>
      <p>This training ensures every score is in the right place. We start with identification and end with shelf-reading.</p>
      <button onclick="startApp()">Start Official Training</button>
    </div>

    <div id="app" class="hidden">
      <div class="card">
        <div id="mod-tag" class="pill">Module</div>
        <div class="progress"><div id="bar"></div></div>
        <div id="screen"></div>
      </div>
    </div>
  </div>

  <script>
    let state = { step: 0, phase: 'teach', streak: 0 };

    const modules = [
      {
        id: "modX",
        title: "Module X: Music Catalogs",
        teach: `<h2>Thematic Catalogs & Work IDs</h2>
                <div class="instruction"><strong>The Golden Rule:</strong> Work IDs confirm the exact piece for a patron but are <b>never</b> used for shelving.</div>
                <p><strong>Composer-Specific Labels:</strong> <b>BWV</b> (Bach), <b>KV</b> (Mozart), <b>Hob.</b> (Haydn), <b>RV</b> (Vivaldi).</p>
                <p><strong>General Labels:</strong> <b>WoO</b> stands for "Works without opus number" and is used for <u>many</u> different composers.</p>`,
        questions: [
          { q: "Which one is a general designation, not a composer-specific catalog?", c: ["BWV", "RV", "WoO", "Hob."], a: 2, e: "Correct! WoO is general." },
          { q: "Which thematic catalog is used specifically for Wolfgang Amadeus Mozart?", c: ["BWV", "KV (or K)", "Hob.", "RV"], a: 1, e: "Correct! Mozart uses KV." }
        ]
      },
      {
        id: "mod2",
        title: "Module 2: First Cutter",
        teach: `<h2>Rule: First Cutters</h2>
                <p>When whole numbers match, look at the first Letter. If letters match, the numbers are read as decimals.</p>
                <div class="instruction">Example: <code class="call">.C4</code> comes before <code class="call">.H26</code>.</div>`,
        questions: [
          { q: "Which call number comes first?", c: ["M 45 .C4 1988", "M 45 .S36 1988", "M 45 .H26 1988"], a: 0, e: "Correct! .C before .S alphabetically." }
        ]
      },
      {
        id: "mod3",
        title: "Module 3: Years & Details",
        teach: `<h2>Rule: Years and Later Details</h2>
                <p>After the Cutter and Year, we look at Series (SER.), Fascicles (FASC.), or Volumes.</p>
                <div class="instruction"><strong>Roman Numerals:</strong> SER. I comes before SER. VI. <br><strong>Sequence:</strong> Fascicles (FASC.) are treated similarly to volumes.</div>`,
        questions: [
          { q: "Which call number comes first?", c: ["M 452 .S36 2005 SER.VI", "M 452 .S36 2005 FASC.3", "M 452 .S36 2005 SER.I"], a: 2, e: "Correct! Series I (Roman Numeral I) comes before VI." }
        ]
      }
    ];

    function startApp() {
      document.getElementById('landing').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      render();
    }

    function render() {
      if (state.step >= modules.length) { finish(); return; }
      const mod = modules[state.step];
      document.getElementById('mod-tag').textContent = mod.title;
      document.getElementById('bar').style.width = (state.step / modules.length * 100) + "%";
      const scr = document.getElementById('screen');

      if (state.phase === 'teach') {
        scr.innerHTML = mod.teach + `<button onclick="state.phase='quiz';render()">Begin Practice</button>`;
      } else {
        const q = mod.questions[state.streak];
        scr.innerHTML = `<h3>Practice</h3><p><b>${q.q}</b></p>` +
          q.c.map((opt, i) => `<button class="choice" onclick="checkAns(${i})">${opt}</button>`).join('') + `<div id="fb"></div>`;
      }
    }

    window.checkAns = function(i) {
      const q = modules[state.step].questions[state.streak];
      const div = document.getElementById('fb');
      if (i === q.a) {
        state.streak++;
        div.innerHTML = `<div class="feedback good">${q.e}</div>` + 
          (state.streak >= modules[state.step].questions.length ? `<button onclick="nextMod()">Next Module</button>` : `<button onclick="render()">Continue</button>`);
      } else {
        div.innerHTML = `<div class="feedback bad">Incorrect. Let's review the rule.</div><button onclick="state.streak=0;state.phase='teach';render()">Review Rule</button>`;
      }
    };

    window.nextMod = function() { state.step++; state.phase = 'teach'; state.streak = 0; render(); };
    function finish() { document.getElementById('screen').innerHTML = `<h2>Success!</h2><p>You have mastered the shelving standards.</p><button onclick="location.reload()">Restart</button>`; }
  </script>
</body>
</html>
